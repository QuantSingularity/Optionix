apiVersion: v1
kind: Service
metadata:
  name: "{{ .Values.appName }}-database"
  namespace: "{{ .Values.namespace }}"
  labels:
    app: "{{ .Values.appName }}-database"
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: { { .Values.database.servicePort } }
      targetPort: 3306
      protocol: TCP
      name: mysql
  selector:
    app: "{{ .Values.appName }}-database"
