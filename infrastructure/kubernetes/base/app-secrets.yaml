# This file uses Helm templating syntax.
# For raw Kubernetes deployments, populate values manually and apply with kubectl.
# For production, use external secret management (AWS Secrets Manager, Vault, ESO).

apiVersion: v1
kind: Secret
metadata:
  name: optionix-secrets
  namespace: "{{ .Values.namespace }}"
  labels:
    app: optionix
type: Opaque
stringData:
  database-url: "mysql://{{ .Values.database.user }}:{{ .Values.database.password }}@{{ .Values.appName }}-database:3306/{{ .Values.database.name }}"
  jwt-secret: "{{ .Values.backend.jwtSecret }}"
  mysql-root-password: "{{ .Values.database.rootPassword }}"
  mysql-password: "{{ .Values.database.password }}"
  encryption-key: "{{ .Values.backend.encryptionKey }}"
  api-key: "{{ .Values.backend.apiKey }}"
  redis-password: '{{ .Values.redis.password | default "" }}'

---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: monitoring
  labels:
    app: grafana
type: Opaque
stringData:
  admin-password: '{{ .Values.monitoring.grafana.adminPassword | default "changeme" }}'

---
apiVersion: v1
kind: Secret
metadata:
  name: elasticsearch-secret
  namespace: logging
  labels:
    app: elasticsearch
type: Opaque
stringData:
  password: '{{ .Values.logging.elasticsearch.password | default "changeme" }}'
