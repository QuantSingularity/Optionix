apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: "{{ .Values.appName }}-database"
  namespace: "{{ .Values.namespace }}"
  labels:
    app: "{{ .Values.appName }}-database"
    tier: database
    component: primary
spec:
  serviceName: "{{ .Values.appName }}-database"
  replicas: "{{ .Values.database.replicas }}"
  selector:
    matchLabels:
      app: "{{ .Values.appName }}-database"
  template:
    metadata:
      labels:
        app: "{{ .Values.appName }}-database"
        tier: database
        component: primary
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9104"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: "{{ .Values.appName }}-database"
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: mysql-init
          image: "{{ .Values.database.image.repository }}:{{ .Values.database.image.tag }}"
          command:
            - /bin/bash
            - -c
            - |
              set -ex
              [[ `hostname` =~ -([0-9]+)$ ]] || exit 1
              ordinal=${BASH_REMATCH[1]}
              echo [mysqld] > /mnt/conf.d/server-id.cnf
              echo server-id=$((100 + $ordinal)) >> /mnt/conf.d/server-id.cnf
              cp /mnt/config-map/my.cnf /mnt/conf.d/
              if [ -d /mnt/ssl-certs ] && [ "$(ls -A /mnt/ssl-certs)" ]; then
                cp -r /mnt/ssl-certs/* /mnt/ssl/
                chmod 600 /mnt/ssl/*
              fi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 999
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: conf
              mountPath: /mnt/conf.d
            - name: config-map
              mountPath: /mnt/config-map
            - name: ssl-certs
              mountPath: /mnt/ssl-certs
              optional: true
            - name: ssl
              mountPath: /mnt/ssl
      containers:
        - name: mysql
          image: "{{ .Values.database.image.repository }}:{{ .Values.database.image.tag }}"
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.appName }}-secrets"
                  key: mysql-root-password
            - name: MYSQL_DATABASE
              value: "{{ .Values.database.name }}"
            - name: MYSQL_USER
              value: "{{ .Values.database.user }}"
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.appName }}-secrets"
                  key: mysql-password
          ports:
            - name: mysql
              containerPort: 3306
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 999
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              memory: "{{ .Values.database.resources.requests.memory }}"
              cpu: "{{ .Values.database.resources.requests.cpu }}"
            limits:
              memory: "{{ .Values.database.resources.limits.memory }}"
              cpu: "{{ .Values.database.resources.limits.cpu }}"
          livenessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - mysqladmin ping -h localhost -u root -p"${MYSQL_ROOT_PASSWORD}" --silent
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - mysql -h localhost -u root -p"${MYSQL_ROOT_PASSWORD}" -e "SELECT 1" --silent
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            exec:
              command:
                - /bin/bash
                - -c
                - mysqladmin ping -h localhost -u root -p"${MYSQL_ROOT_PASSWORD}" --silent
            failureThreshold: 30
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
              subPath: mysql
            - name: conf
              mountPath: /etc/mysql/conf.d
            - name: ssl
              mountPath: /etc/mysql/ssl
            - name: tmp
              mountPath: /tmp
        - name: mysql-exporter
          image: prom/mysqld-exporter:v0.15.1
          args:
            - --collect.info_schema.tables
            - --collect.info_schema.innodb_metrics
            - --collect.global_status
            - --collect.global_variables
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.appName }}-secrets"
                  key: mysql-root-password
            - name: DATA_SOURCE_NAME
              value: "root:$(MYSQL_ROOT_PASSWORD)@(localhost:3306)/"
          ports:
            - name: metrics
              containerPort: 9104
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9104
            initialDelaySeconds: 15
            periodSeconds: 20
        - name: backup-agent
          image: "{{ .Values.database.image.repository }}:{{ .Values.database.image.tag }}"
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              while true; do
                sleep 3600
                TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                BACKUP_FILE="/backup/backup-${TIMESTAMP}.sql.gz"
                mysqldump -h 127.0.0.1 -u root -p"${MYSQL_ROOT_PASSWORD}" \
                  --all-databases --single-transaction \
                  --routines --triggers --events \
                  --hex-blob --set-gtid-purged=OFF \
                  2>/dev/null | gzip > "${BACKUP_FILE}"
                find /backup -name "backup-*.sql.gz" -mtime +7 -delete
                echo "[$(date)] Backup completed: ${BACKUP_FILE}"
              done
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.appName }}-secrets"
                  key: mysql-root-password
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 999
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          volumeMounts:
            - name: backup
              mountPath: /backup
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: conf
          emptyDir: {}
        - name: config-map
          configMap:
            name: "{{ .Values.appName }}-database-config"
        - name: ssl-certs
          secret:
            secretName: "{{ .Values.appName }}-database-ssl-certs"
            optional: true
        - name: ssl
          emptyDir: {}
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi
        - name: backup
          persistentVolumeClaim:
            claimName: "{{ .Values.appName }}-database-backup-pvc"
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: "{{ .Values.database.storageClass }}"
        resources:
          requests:
            storage: "{{ .Values.database.storage }}"
