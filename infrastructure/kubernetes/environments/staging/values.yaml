appName: optionix
environment: staging
backend:
  replicas: 3
  image:
    repository: registry.example.com/app/backend
    tag: stable
    pullPolicy: Always
  containerPort: 8000
  servicePort: 8000
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi
  apiUrl: http://app-backend
  jwtSecret: staging-jwt-secret
  apiKey: staging-api-key
  encryptionKey: CHANGE_ME_32_CHAR_KEY_HERE_XXXX
  version: stable
frontend:
  replicas: 3
  image:
    repository: registry.example.com/app/frontend
    tag: stable
    pullPolicy: Always
  containerPort: 80
  servicePort: 80
  apiUrl: /api
  service:
    type: ClusterIP
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi
database:
  replicas: 1
  image:
    repository: mysql
    tag: 8.0
    pullPolicy: IfNotPresent
  containerPort: 3306
  servicePort: 3306
  name: optionixdb
  user: appuser
  password: staging-password
  rootPassword: staging-root-password
  url: mysql://appuser:staging-password@app-database:3306/appdb
  storageClass: standard
  storage: 20Gi
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 1000m
      memory: 1Gi
  host: optionix-database
  backupStorageClass: standard
  backupStorage: 20Gi
redis:
  replicas: 2
  image:
    repository: redis
    tag: 6.2
    pullPolicy: IfNotPresent
  containerPort: 6379
  servicePort: 6379
  storageClass: standard
  storage: 10Gi
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 512Mi
  password: CHANGE_ME_REDIS_PASSWORD
  maxmemory: 1g
ingress:
  host: staging.optionix.example.com
  class: nginx
  sslRedirect: "true"
  certManager:
    issuer: letsencrypt-staging
logLevel: info
imagePullSecrets: regcred
namespace: optionix
monitoring:
  grafana:
    adminPassword: CHANGE_ME_GRAFANA_PASSWORD
logging:
  elasticsearch:
    password: CHANGE_ME_ES_PASSWORD
